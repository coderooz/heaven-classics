name: Welcome

on:
  issues:
    types:
      - opened
  pull_request_target:
    types:
      - opened

permissions:
  issues: write
  pull-requests: write

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - name: Greet first-time contributors
        uses: actions/first-interaction@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            Thanks for opening your first issue!

            If this is a bug report, please include the steps to reproduce, expected behavior, and actual behavior.
          pr-message: |
            Thanks for opening your first pull request!

            Please make sure the PR description clearly describes the changes and that all checks pass.