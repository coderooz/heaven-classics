name: "Manage Stale"

on:
  schedule:
    - cron: "30 2 * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          days-before-stale: 60
          days-before-close: 14
          stale-issue-message: "This issue has been stale for 60 days. It will be closed in 14 days if there's no activity."
          stale-pr-message: "This PR has been stale for 60 days. It will be closed in 14 days if there's no activity."
          close-issue-message: "Issue closed due to inactivity."
          close-pr-message: "PR closed due to inactivity."
          exempt-issue-labels: "pinned,security"
          exempt-pr-labels: "pinned"
          operations-per-run: 100