name: Feature request
description: Suggest an improvement or new feature.
title: "[Feature]: "
labels:
  - enhancement
assignees:
  - 'coderooz'
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: Explain the gap or limitation you are hitting.
      placeholder: The current implementation does not support X which is needed for Y.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the change you want to see.
      placeholder: Add a new feature that allows users to do X.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: List any workarounds or other approaches you considered.
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - P1 - Critical (blocks usage)
        - P2 - High (major impact)
        - P3 - Medium (workaround exists)
        - P4 - Low (nice to have)
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add examples, mockups, or project scenarios that support the request.