name: Documentation improvement
description: Request a content, clarity, or structure improvement for the docs.
title: "[Docs]: "
labels:
  - documentation
assignees:
  - 'coderooz'
body:
  - type: input
    id: section
    attributes:
      label: Affected section
      description: Which part of the documentation needs work?
      placeholder: README.md -> Getting Started
    validations:
      required: true
  - type: textarea
    id: current_problem
    attributes:
      label: Current problem
      description: Explain what is confusing, missing, or outdated.
    validations:
      required: true
  - type: textarea
    id: suggested_change
    attributes:
      label: Suggested improvement
      description: Describe how the documentation should be improved.
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - P1 - Critical (blocks usage)
        - P2 - High (major impact)
        - P3 - Medium (workaround exists)
        - P4 - Low (nice to have)
    validations:
      required: true
  - type: textarea
    id: references
    attributes:
      label: References
      description: Add examples, links, or comparable documentation if relevant.